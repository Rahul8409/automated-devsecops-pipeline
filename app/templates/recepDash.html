{% extends 'layout.html' %}

{% block body %}
<div style="margin-bottom: 36px;">
    <p class="gc-section-title">Receptionist Panel</p>
    <h1 style="font-family: var(--font-display); font-size: 42px; font-weight: 800; margin-bottom: 8px;">
        Welcome, <span style="color: #4db8ff;">{{ session.username }}</span>
    </h1>
    <p style="color: var(--text-secondary); font-size: 15px;">Manage members and view details from here.</p>
</div>

<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px;">

    <a href="{{ url_for('addMember') }}" style="text-decoration:none;">
        <div class="gc-card" style="cursor:pointer;display:flex;align-items:center;gap:14px;padding:18px 20px;">
            <div style="width:38px;height:38px;background:rgba(0,200,100,0.1);border:1px solid rgba(0,200,100,0.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">＋</div>
            <div>
                <p style="font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#00c864;margin:0;">Add Member</p>
                <p style="font-size:12px;color:var(--text-muted);margin:0;">Enrol new member</p>
            </div>
        </div>
    </a>

    <a href="{{ url_for('deleteMember') }}" style="text-decoration:none;">
        <div class="gc-card" style="cursor:pointer;display:flex;align-items:center;gap:14px;padding:18px 20px;">
            <div style="width:38px;height:38px;background:rgba(255,59,59,0.08);border:1px solid rgba(255,59,59,0.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">✕</div>
            <div>
                <p style="font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent-red);margin:0;">Delete Member</p>
                <p style="font-size:12px;color:var(--text-muted);margin:0;">Remove membership</p>
            </div>
        </div>
    </a>

    <a href="{{ url_for('viewDetails') }}" style="text-decoration:none;">
        <div class="gc-card" style="cursor:pointer;display:flex;align-items:center;gap:14px;padding:18px 20px;">
            <div style="width:38px;height:38px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">◎</div>
            <div>
                <p style="font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-secondary);margin:0;">View Details</p>
                <p style="font-size:12px;color:var(--text-muted);margin:0;">All user profiles</p>
            </div>
        </div>
    </a>

</div>
{% endblock %}

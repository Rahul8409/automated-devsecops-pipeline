{% extends 'layout.html' %}

{% block body %}
<div style="min-height: 70vh; display: flex; align-items: center; justify-content: center;">
    <div style="width: 100%; max-width: 420px;">

        <div style="text-align: center; margin-bottom: 36px;">
            <p class="gc-section-title">Gym Management</p>
            <h1 style="font-family: var(--font-display); font-size: 48px; font-weight: 800; letter-spacing: 2px; line-height: 1;">
                SHIVAM<span style="color: var(--accent);"> GYM</span>
            </h1>
            <p style="color: var(--text-muted); font-size: 13px; margin-top: 8px;">Sign in to your account</p>
        </div>

        <div class="gc-card" style="border-top: 2px solid var(--accent);">
            <form action="" method="POST">
                <div class="gc-form-group">
                    <label class="gc-label">Username</label>
                    <input type="text" name="username" class="gc-input" value="{{ request.form.username }}" placeholder="Enter your username" autocomplete="off">
                </div>
                <div class="gc-form-group" style="margin-bottom: 28px;">
                    <label class="gc-label">Password</label>
                    <input type="password" name="password" class="gc-input" placeholder="Enter your password">
                </div>
                <button type="submit" class="gc-btn gc-btn-primary" style="width: 100%; justify-content: center; font-size: 15px; padding: 14px;">
                    Sign In →
                </button>
            </form>
        </div>

        <p style="text-align: center; color: var(--text-muted); font-size: 12px; margin-top: 24px; font-family: var(--font-display); letter-spacing: 1px;">
            SHIVAM GYM &nbsp;·&nbsp; MANAGEMENT SYSTEM
        </p>
    </div>
</div>
{% endblock %}
